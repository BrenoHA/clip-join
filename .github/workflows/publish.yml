name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC identity for Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org" # npmjs.com, not GitHub Packages
      - run: npm install -g npm@latest # Trusted Publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run
      # No NODE_AUTH_TOKEN: auth + provenance come from OIDC Trusted Publishing.
      - run: npm publish --access public
